<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Sea Hex Map Mapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --hex-width: 100px;
            --hex-height: 110px;
            --ocean-deep: #1e3a8a;
            --ocean-shallow: #3b82f6;
            --reef-color: #0d9488;
            --sand: #d4a373; 
            --island: #ca8a04;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            padding: 150px;
            cursor: grab;
            background: #020617;
            scrollbar-width: thin;
            scrollbar-color: #334155 #020617;
        }

        #map-container:active { cursor: grabbing; }

        .hex-grid {
            display: grid;
            grid-template-columns: repeat(30, calc(var(--hex-width) * 0.75));
            gap: 0;
            padding-bottom: 200px; 
        }

        .hex {
            width: var(--hex-width);
            height: var(--hex-height);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            margin-bottom: calc(var(--hex-height) * -0.22);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .hex.even-col {
            transform: translateY(calc(var(--hex-height) * 0.5));
        }

        .hex:hover {
            filter: brightness(1.4);
            z-index: 50;
        }

        .hex.selected {
            filter: brightness(1.3) contrast(1.2);
            z-index: 51;
        }
        
        .hex.selected::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 75%);
            border: 2px solid gold;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            pointer-events: none;
        }

        .hex.has-ship::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 3px solid #fbbf24;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            z-index: 10;
            box-shadow: 0 0 15px #fbbf24;
            pointer-events: none;
        }

        .ship-indicator {
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 1.2rem;
            z-index: 20;
            filter: drop-shadow(0 0 5px gold);
        }

        .t-ocean { background-color: var(--ocean-deep); }
        .t-shallow { background-color: var(--ocean-shallow); }
        .t-coast { background-color: var(--sand); color: #451a03; }
        .t-reef { background-color: #0d9488; }
        .t-island { background-color: var(--island); }
        .t-hazard { background-color: #7f1d1d; }
        .t-mysterious { background-color: #581c87; }

        .hex-icon {
            font-size: 1.6rem;
            pointer-events: none;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
            z-index: 2;
        }

        .encounter-tag {
            font-size: 0.6rem;
            background: rgba(0,0,0,0.85);
            padding: 2px 5px;
            border-radius: 4px;
            margin-top: 4px;
            max-width: 85%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 2;
            color: #fbbf24;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .coord-label {
            position: absolute;
            bottom: 8px;
            font-size: 0.6rem;
            opacity: 0.4;
            pointer-events: none;
            font-family: monospace;
        }

        #sidebar {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.9);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
        .status-online { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
        .status-offline { background: #ef4444; }

        .swatch {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
            text-align: center;
            line-height: 20px;
            font-size: 10px;
            font-weight: bold;
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>

    <div id="controls">
        <div id="sync-status" class="flex items-center mr-2">
            <span class="status-dot status-offline" id="status-indicator"></span>
            <span class="text-[10px] uppercase font-bold text-slate-400" id="status-text">Connecting...</span>
        </div>
        <button id="save-btn" onclick="manualSave()" class="bg-blue-600 px-3 py-1.5 rounded font-bold hover:bg-blue-500 transition text-sm">Force Save</button>
        <button onclick="randomizeEncounters()" class="bg-purple-700 px-3 py-1.5 rounded font-bold hover:bg-purple-600 transition text-sm">Randomize Encounters</button>
        <button onclick="clearMap()" class="bg-slate-700 px-3 py-1.5 rounded hover:bg-slate-600 transition text-sm">Reset</button>
        <div class="h-6 w-px bg-slate-700 mx-1"></div>
        <span class="text-[10px] font-mono text-slate-400 leading-tight">30x20 Grid<br>Cloud Sync Active</span>
    </div>

    <div id="sidebar">
        <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2 flex justify-between">
            <span>Hex Inspector</span>
            <span id="coord-display" class="text-blue-400">--</span>
        </h2>
        
        <div id="inspector-content">
            <p class="text-slate-400 italic">Select a hex to configure the ocean crawl.</p>
        </div>
        
        <div class="mt-8 pt-6 border-t border-slate-700">
            <h3 class="text-xs uppercase font-bold text-slate-500 mb-3 tracking-widest">Hotkeys (Hover + Key)</h3>
            <ul class="text-xs space-y-2 opacity-80">
                <li><span class="swatch t-ocean">1-7</span> Change Terrain</li>
                <li><span class="swatch bg-amber-500 text-black">S</span> Deploy Ship to Hex</li>
                <li><span class="swatch bg-red-900">Del</span> Clear Cell</li>
            </ul>
        </div>
    </div>

    <div id="map-container">
        <div class="hex-grid" id="grid"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables provided by environment
        const firebaseConfig = const firebaseConfig = {
             apiKey: "AIzaSyDf73oX81WYrcz02YO_rb2ummuL9AeuHgo",
            authDomain: "hexmapp-test.firebaseapp.com",
             projectId: "hexmapp-test",
             storageBucket: "hexmapp-test.firebasestorage.app",
             messagingSenderId: "282984033208",
            appId: "1:282984033208:web:98e0b659ce80ecde2d7d4d",
             measurementId: "G-9PPB1HSRLT"
            };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'azure-sea-mapper-public';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // App State
        const COLS = 30;
        const ROWS = 20;
        let mapData = {};
        let shipLocation = null;
        let selectedHexId = null;
        let hoveredHexId = null;
        let user = null;

        const TERRAINS = {
            ocean: { label: 'Deep Water', class: 't-ocean', defaultIcon: '', key: '1' },
            shallow: { label: 'Shallows', class: 't-shallow', defaultIcon: '🌊', key: '2' },
            coast: { label: 'Mainland Coast', class: 't-coast', defaultIcon: '⚓', key: '3' },
            island: { label: 'Island', class: 't-island', defaultIcon: '🏝️', key: '4' },
            reef: { label: 'Coral Reef', class: 't-reef', defaultIcon: '🪸', key: '5' },
            hazard: { label: 'Danger', class: 't-hazard', defaultIcon: '⚠️', key: '6' },
            mysterious: { label: 'Mysterious', class: 't-mysterious', defaultIcon: '✨', key: '7' }
        };

        const ENCOUNTERS = {
            "None": "",
            "Shoal (Shark/Sahuagin)": "🔱",
            "Surface Reef": "🪸",
            "Mist (Table)": "🌫️",
            "Blue Hole": "🌀",
            "Whirlpool": "🌪️",
            "Shipwreck": "🏚️",
            "Fishing Traps": "🕸️",
            "Dragon": "🐉",
            "Sargasso": "🌿",
            "Merchant": "🚢",
            "Pirate": "🏴‍☠️",
            "Permanent Storm": "⛈️",
            "Monster Lair": "🕳️",
            "Abyssal Undead": "💀",
            "Abyssal Fungi": "🍄"
        };

        // --- UTILS ---
        function getColLetter(index) {
            let letter = '';
            while (index >= 0) {
                letter = String.fromCharCode((index % 26) + 65) + letter;
                index = Math.floor(index / 26) - 1;
            }
            return letter;
        }

        // --- CLOUD SYNC ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed", err);
            }
        }

        function getMapDocRef() {
            // Ensuring the path segments are even: artifacts (1) / {appId} (2) / public (3) / data (4) / mapState (5) / v1 (6)
            return doc(db, 'artifacts', appId, 'public', 'data', 'mapState', 'v1');
        }

        function setupSync() {
            const docRef = getMapDocRef();
            
            // Listen for changes
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const remote = docSnap.data();
                    mapData = remote.mapData || {};
                    shipLocation = remote.shipLocation || null;
                    renderMap();
                    if (selectedHexId) selectHex(selectedHexId);
                } else {
                    // Initialize empty map if first time
                    saveToCloud();
                }
                document.getElementById('status-indicator').className = "status-dot status-online";
                document.getElementById('status-text').innerText = "Online";
            }, (err) => {
                console.error("Sync error:", err.code, err.message);
                document.getElementById('status-indicator').className = "status-dot status-offline";
                document.getElementById('status-text').innerText = "Sync Error";
            });
        }

        async function saveToCloud() {
            if (!user) return;
            const docRef = getMapDocRef();
            try {
                await setDoc(docRef, {
                    mapData: mapData,
                    shipLocation: shipLocation,
                    updatedAt: Date.now()
                });
            } catch (err) {
                console.error("Cloud save failed:", err.code, err.message);
            }
        }

        // --- RENDER ---
        function renderMap() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const id = `${getColLetter(c)}${r + 1}`;
                    if (!mapData[id]) {
                        mapData[id] = { terrain: c === 0 ? 'coast' : 'ocean', encounter: 'None', notes: '' };
                    }
                    createHex(id, mapData[id], c);
                }
            }
        }

        function createHex(id, data, colIndex) {
            const hex = document.createElement('div');
            hex.id = `hex-${id}`;
            const isEvenCol = colIndex % 2 !== 0;
            updateHexAppearance(hex, id, data, isEvenCol);
            hex.onclick = () => selectHex(id, isEvenCol);
            hex.onmouseenter = () => hoveredHexId = id;
            hex.onmouseleave = () => hoveredHexId = null;
            document.getElementById('grid').appendChild(hex);
        }

        function updateHexAppearance(el, id, data, isEvenCol) {
            if (!el) return;
            const terrain = TERRAINS[data.terrain] || TERRAINS.ocean;
            if (isEvenCol === undefined) {
                const colLetter = id.replace(/[0-9]/g, '');
                const colIndex = colLetter.split('').reduce((acc, char, i) => acc + (char.charCodeAt(0) - 64) * Math.pow(26, colLetter.length - i - 1), 0) - 1;
                isEvenCol = colIndex % 2 !== 0;
            }
            const isShipHere = shipLocation === id;
            el.className = `hex ${terrain.class} ${selectedHexId === id ? 'selected' : ''} ${isEvenCol ? 'even-col' : ''} ${isShipHere ? 'has-ship' : ''}`;
            const mainIcon = (ENCOUNTERS[data.encounter] || "") || terrain.defaultIcon;
            el.innerHTML = `
                <div class="hex-icon">${mainIcon}</div>
                ${isShipHere ? '<div class="ship-indicator">⛵</div>' : ''}
                ${data.encounter !== 'None' ? `<div class="encounter-tag">${data.encounter}</div>` : ''}
                <div class="coord-label">${id}</div>
            `;
        }

        // --- ACTIONS ---
        window.selectHex = (id, isEvenCol) => {
            const oldId = selectedHexId;
            selectedHexId = id;
            if (oldId && oldId !== id) updateHexAppearance(document.getElementById(`hex-${oldId}`), oldId, mapData[oldId]);
            updateHexAppearance(document.getElementById(`hex-${id}`), id, mapData[id], isEvenCol);
            document.getElementById('coord-display').innerText = id;
            const data = mapData[id];
            document.getElementById('inspector-content').innerHTML = `
                <div class="space-y-6">
                    <div class="flex items-center justify-between p-3 bg-slate-800/50 rounded-lg border border-slate-700">
                        <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Party Location</span>
                        <button onclick="moveShip('${id}')" class="px-3 py-1 bg-amber-600 hover:bg-amber-500 rounded text-[10px] font-bold uppercase transition">
                            ${shipLocation === id ? 'Ship is here' : 'Deploy Ship'}
                        </button>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-500 font-bold block mb-2 tracking-widest text-blue-400">Environment</label>
                        <select onchange="updateHex('${id}', 'terrain', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-blue-500">
                            ${Object.keys(TERRAINS).map(t => `<option value="${t}" ${data.terrain === t ? 'selected' : ''}>${TERRAINS[t].label}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-500 font-bold block mb-2 tracking-widest">Active Encounter</label>
                        <select onchange="updateHex('${id}', 'encounter', this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-blue-500">
                            ${Object.keys(ENCOUNTERS).map(e => `<option value="${e}" ${data.encounter === e ? 'selected' : ''}>${e}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-500 font-bold block mb-2 tracking-widest">Secrets & Notes</label>
                        <textarea oninput="updateHex('${id}', 'notes', this.value)" placeholder="NPCs, loot, or lore..." class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm h-32 outline-none focus:border-blue-500 resize-none text-white">${data.notes || ''}</textarea>
                    </div>
                    <button onclick="quickDelete('${id}')" class="w-full py-2 bg-red-900/40 text-red-400 border border-red-900/60 rounded-lg text-xs hover:bg-red-900/60 transition">Clear Cell (Del)</button>
                </div>
            `;
        }

        window.updateHex = (id, field, value) => {
            if (!mapData[id]) return;
            mapData[id][field] = value;
            updateHexAppearance(document.getElementById(`hex-${id}`), id, mapData[id]);
            saveToCloud();
        }

        window.moveShip = (newId) => {
            const oldId = shipLocation;
            shipLocation = newId;
            if (oldId) updateHexAppearance(document.getElementById(`hex-${oldId}`), oldId, mapData[oldId]);
            updateHexAppearance(document.getElementById(`hex-${newId}`), newId, mapData[newId]);
            if (selectedHexId === newId || selectedHexId === oldId) selectHex(selectedHexId);
            saveToCloud();
        }

        window.quickDelete = (id) => {
            const data = mapData[id];
            if (!id.startsWith('A')) data.terrain = 'ocean';
            data.encounter = 'None';
            data.notes = '';
            updateHexAppearance(document.getElementById(`hex-${id}`), id, data);
            if (selectedHexId === id) selectHex(id);
            saveToCloud();
        }

        window.randomizeEncounters = () => {
            if(!confirm("Randomly populate encounters? Existing environment and notes will be preserved.")) return;
            const keys = Object.keys(ENCOUNTERS).filter(k => k !== 'None');
            for (let id in mapData) {
                if (id.startsWith('A')) continue; 
                mapData[id].encounter = Math.random() < 0.15 ? keys[Math.floor(Math.random() * keys.length)] : 'None';
            }
            saveToCloud();
        }

        window.manualSave = async () => {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving...";
            await saveToCloud();
            btn.innerText = "Saved!";
            setTimeout(() => btn.innerText = "Force Save", 2000);
        }

        window.clearMap = async () => {
            if(confirm("Wipe map data and reset to defaults? This will affect all users.")) {
                mapData = {};
                shipLocation = null;
                await saveToCloud();
                location.reload();
            }
        }

        // --- KEYBOARD ---
        window.addEventListener('keydown', (e) => {
            const targetId = hoveredHexId || selectedHexId;
            if (!targetId || document.activeElement.tagName === 'TEXTAREA') return;
            const tk = { '1': 'ocean', '2': 'shallow', '3': 'coast', '4': 'island', '5': 'reef', '6': 'hazard', '7': 'mysterious' };
            if (tk[e.key]) updateHex(targetId, 'terrain', tk[e.key]);
            if (e.key.toLowerCase() === 's') moveShip(targetId);
            if (e.key === 'Delete' || e.key === 'Backspace') quickDelete(targetId);
        });

        // --- PANNING ---
        let isDown = false, startX, startY, scrollLeft, scrollTop;
        const container = document.getElementById('map-container');
        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('.hex') || e.target.closest('#sidebar') || e.target.closest('#controls')) return;
            isDown = true; startX = e.pageX - container.offsetLeft; startY = e.pageY - container.offsetTop;
            scrollLeft = container.scrollLeft; scrollTop = container.scrollTop;
        });
        window.addEventListener('mouseup', () => isDown = false);
        container.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            container.scrollLeft = scrollLeft - (e.pageX - container.offsetLeft - startX) * 1.5;
            container.scrollTop = scrollTop - (e.pageY - container.offsetTop - startY) * 1.5;
        });

        // --- START ---
        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (user) {
                setupSync();
            } else {
                await initAuth();
            }
        });
        // Initial call if listener doesn't trigger immediately
        if (!auth.currentUser) initAuth();
    </script>
</body>
</html>
